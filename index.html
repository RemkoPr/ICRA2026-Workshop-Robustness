<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICRA 2026 Workshop PDF</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      header {
        padding: 1rem;
        background: #111827;
        color: #fff;
      }
      main {
        height: calc(100vh - 74px);
      }
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>ICRA 2026 Workshop PDF Viewer</strong>
      <div>Replace <code>workshop.pdf</code> in this repository to publish your own PDF.</div>
    </header>
    <main>
      <iframe src="./workshop.pdf" title="Workshop PDF"></iframe>
    </main>
  </body>
</html>
